services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-archura_blog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-archura_blog}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-archura_blog}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      PORT: 4000
      UPLOAD_DIR: /app/uploads
      PUBLIC_URL: ${PUBLIC_URL:?Set PUBLIC_URL in .env}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-webhook-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-${PUBLIC_URL}}
      SEED_ON_START: ${SEED_ON_START:-false}
      SITE_REBUILD_URL: http://web:3001/rebuild
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-archura_blog}
      SITE_URL: ${SITE_URL:-${PUBLIC_URL}}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-webhook-secret}
    ports:
      - '${HTTP_PORT:-80}:80'

volumes:
  postgres_data:
  uploads:
