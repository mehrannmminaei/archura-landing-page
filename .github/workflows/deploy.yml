name: Build and Deploy Blog

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  SITE_URL: https://www.archuramedia.com
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archura_blog

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archura_blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prepare database
        run: npm run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || env.DATABASE_URL }}

      - name: Build Astro site
        run: npm run build:site
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || env.DATABASE_URL }}

      - name: Merge legacy static pages into dist
        run: |
          cp index.html services.html industry.html dist/ 2>/dev/null || true
          cp -r services industry privacy-terms dist/ 2>/dev/null || true
          cp robots.txt sitemap*.xml favicon.ico logo*.png dist/ 2>/dev/null || true

      - name: Deploy via FTP
        if: vars.ENABLE_FTP_DEPLOY == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.FTP_SERVER_DIR || '/' }}
